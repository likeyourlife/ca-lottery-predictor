name: Daily Prediction Pipeline

on:
  schedule:
    - cron: '40 1 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install numpy scipy

      - name: Run prediction pipeline
        run: python daily_pipeline.py

      - name: Generate frontend data
        run: python frontend/generate_api_data.py

      - name: Update draw_data.json
        run: |
          python -c "
          import json, sys
          sys.path.insert(0, '.')
          from data.fetcher import init_fantasy5_data
          fetcher = init_fantasy5_data()
          draws = fetcher.get_all_draws()
          compact = [{'d': d['draw_date'], 'n': [d['num1'], d['num2'], d['num3'], d['num4'], d['num5']]} for d in draws]
          with open('frontend/draw_data.json', 'w') as f:
              json.dump(compact, f, separators=(',', ':'))
          print(f'Updated draw_data.json: {len(compact)} records')
          "

      - name: Build docs for GitHub Pages
        run: |
          mkdir -p docs
          cp frontend/index.html docs/
          cp frontend/prediction_engines.js docs/
          cp frontend/draw_data.json docs/
          cp frontend/prediction.json docs/
          cp frontend/recent_draws.json docs/
          cp frontend/consecutive_absence.json docs/
          cp frontend/daily_accuracy.json docs/
          cp frontend/monthly_accuracy.json docs/
          cp frontend/README.md docs/ 2>/dev/null || true

