name: Daily Prediction Pipeline

on:
  schedule:
    - cron: '40 1 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install numpy scipy

      - name: Run prediction pipeline
        run: python daily_pipeline.py

      - name: Generate frontend data
        run: python frontend/generate_api_data.py

      - name: Update draw_data.json
        run: |
          python -c "
          import json, sys
          sys.path.insert(0, '.')
          from data.fetcher import init_fantasy5_data
          fetcher = init_fantasy5_data()
          draws = [{'d': d['date'], 'n': d['numbers']} for d in fetcher.all_draws]
          with open('frontend/draw_data.json', 'w') as f:
              json.dump(draws, f, separators=(',', ':'))
          print(f'Updated draw_data.json: {len(draws)} records')
          "

      - name: Build docs for GitHub Pages
        run: |
          mkdir -p docs
          cp frontend/index.html docs/
          cp frontend/prediction_engines.js docs/
          cp frontend/draw_data.json docs/
          cp frontend/api_data/*.json docs/
          cp frontend/README.md docs/ 2>/dev/null || true

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "auto: daily prediction update"
          git push
